<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mebel Katalog</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#FAFAF8;--card:#fff;--accent:#2C2C2A;--green:#3B6D11;--green-light:#EAF3DE;--text:#2C2C2A;--text2:#888780;--border:#E8E6E0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

.header{background:#fff;border-bottom:1px solid var(--border);padding:14px 16px;position:sticky;top:0;z-index:100}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.logo{font-family:'Playfair Display',serif;font-size:20px;font-weight:600}
.logo span{color:var(--green)}
.search{display:flex;align-items:center;background:#F5F4F0;border-radius:12px;padding:8px 12px;gap:8px}
.search input{border:none;background:transparent;font-size:14px;font-family:'DM Sans',sans-serif;color:var(--text);outline:none;width:100%}

.groups-bar{display:flex;gap:8px;padding:12px 16px;overflow-x:auto;scrollbar-width:none;background:#fff;border-bottom:1px solid var(--border)}
.groups-bar::-webkit-scrollbar{display:none}
.group-btn{white-space:nowrap;padding:7px 14px;border-radius:20px;border:1.5px solid var(--border);background:#fff;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:5px}
.group-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}

.cats-bar{display:flex;gap:8px;padding:10px 16px;overflow-x:auto;scrollbar-width:none;background:#FAFAF8}
.cats-bar::-webkit-scrollbar{display:none}
.cat-chip{white-space:nowrap;padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:#fff;font-size:12px;color:var(--text2);cursor:pointer;transition:all 0.2s}
.cat-chip.active{background:var(--green-light);color:var(--green);border-color:var(--green)}

.section-title{font-family:'Playfair Display',serif;font-size:17px;padding:16px 16px 8px;color:var(--accent)}

.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:0 12px 24px}
.prod-card{background:var(--card);border-radius:14px;border:1px solid var(--border);overflow:hidden;cursor:pointer;transition:transform 0.15s,box-shadow 0.15s}
.prod-card:active{transform:scale(0.97)}
.prod-img{width:100%;aspect-ratio:1;object-fit:cover;background:#F0EEE8;display:flex;align-items:center;justify-content:center;font-size:44px}
.prod-img img{width:100%;height:100%;object-fit:cover}
.prod-info{padding:10px}
.prod-name{font-size:13px;font-weight:500;line-height:1.4;margin-bottom:4px}
.prod-desc{font-size:11px;color:var(--text2);line-height:1.5;margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.tags{display:flex;flex-wrap:wrap;gap:3px}
.tag{font-size:10px;padding:2px 7px;border-radius:10px;background:var(--green-light);color:var(--green)}

.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:200;align-items:flex-end}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:20px 20px 0 0;width:100%;max-height:88vh;overflow-y:auto}
.modal-handle{width:36px;height:4px;background:#E0DED8;border-radius:2px;margin:12px auto 0}
.modal-img{width:100%;aspect-ratio:4/3;background:#F0EEE8;display:flex;align-items:center;justify-content:center;font-size:80px;overflow:hidden}
.modal-img img{width:100%;height:100%;object-fit:cover}
.modal-body{padding:18px 18px 32px}
.modal-name{font-family:'Playfair Display',serif;font-size:21px;font-weight:600;margin-bottom:6px}
.modal-desc{font-size:14px;color:var(--text2);line-height:1.7;margin-bottom:16px}
.section-label{font-size:12px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px}
.colors-list{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.color-item{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:20px;border:1px solid var(--border);font-size:12px;cursor:pointer;transition:all 0.2s}
.color-item.selected{border-color:var(--accent);background:#F5F4F0;font-weight:500}
.color-dot{width:14px;height:14px;border-radius:50%;border:1px solid rgba(0,0,0,0.1)}
.sizes-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:20px}
.size-box{background:#F5F4F0;border-radius:10px;padding:10px;font-size:13px;line-height:1.5}
.size-label{font-size:11px;color:var(--text2);margin-bottom:2px}
.contact-btn{width:100%;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:14px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
.close-btn{position:absolute;top:56px;right:14px;width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,0.9);border:none;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;z-index:10}
.modal{position:relative}
.empty{text-align:center;padding:48px 20px;color:var(--text2)}
.empty-icon{font-size:44px;margin-bottom:10px}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo">Mebel<span>Katalog</span></div>
  </div>
  <div class="search">
    <span style="font-size:16px;color:var(--text2)">🔍</span>
    <input type="text" placeholder="Mahsulot qidiring..." id="searchInput" oninput="doSearch()">
  </div>
</div>

<div class="groups-bar" id="groupsBar"></div>
<div class="cats-bar" id="catsBar"></div>
<div class="section-title" id="sectionTitle">Barcha mahsulotlar</div>
<div class="grid" id="productGrid"></div>

<div class="modal-overlay" id="modal" onclick="handleModalClick(event)">
  <div class="modal" id="modalBox">
    <div class="modal-handle"></div>
    <button class="close-btn" onclick="closeModal()">✕</button>
    <div class="modal-img" id="mImg"></div>
    <div class="modal-body">
      <div class="tags" id="mTags" style="margin-bottom:8px"></div>
      <div class="modal-name" id="mName"></div>
      <div class="modal-desc" id="mDesc"></div>
      <div class="section-label">Mavjud ranglar</div>
      <div class="colors-list" id="mColors"></div>
      <div class="section-label">O'lchamlar</div>
      <div class="sizes-grid" id="mSizes"></div>
      function contactAdmin(){
  closeModal();
  window.open('https://t.me/ElyorMurotaliyev', '_blank');
  if(window.Telegram?.WebApp){
    window.Telegram.WebApp.close();
  }
}
    </div>
  </div>
</div>

<script>
let groups=[], cats=[], products=[], currentGroup=null, currentCat=null;

async function init(){
  groups = await fetch('/api/groups').then(r=>r.json());
  cats = await fetch('/api/categories').then(r=>r.json());
  products = await fetch('/api/products').then(r=>r.json());
  renderGroups();
  renderProducts(products);
}

function renderGroups(){
  const bar = document.getElementById('groupsBar');
  bar.innerHTML = `<button class="group-btn active" onclick="selectGroup(null,this)">Barchasi</button>` +
    groups.map(g=>`<button class="group-btn" onclick="selectGroup(${g.id},this)">${g.icon} ${g.name}</button>`).join('');
}

function selectGroup(id, btn){
  currentGroup=id; currentCat=null;
  document.querySelectorAll('.group-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderCats();
  filterAndRender();
  document.getElementById('sectionTitle').textContent = id ? groups.find(g=>g.id===id)?.name : 'Barcha mahsulotlar';
}

function renderCats(){
  const bar = document.getElementById('catsBar');
  const filtered = currentGroup ? cats.filter(c=>c.group_id===currentGroup) : cats;
  if(!filtered.length){bar.innerHTML='';return;}
  bar.innerHTML = `<div class="cat-chip active" onclick="selectCat(null,this)">Barchasi</div>` +
    filtered.map(c=>`<div class="cat-chip" onclick="selectCat(${c.id},this)">${c.icon} ${c.name}</div>`).join('');
}

function selectCat(id, el){
  currentCat=id;
  document.querySelectorAll('.cat-chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  filterAndRender();
  if(id) document.getElementById('sectionTitle').textContent = cats.find(c=>c.id===id)?.name;
}

function filterAndRender(){
  let filtered = products;
  if(currentGroup) filtered = filtered.filter(p=>{
    const cat = cats.find(c=>c.id===p.category_id);
    return cat && cat.group_id===currentGroup;
  });
  if(currentCat) filtered = filtered.filter(p=>p.category_id===currentCat);
  renderProducts(filtered);
}

function doSearch(){
  const q = document.getElementById('searchInput').value.toLowerCase();
  if(!q){filterAndRender();return;}
  const filtered = products.filter(p=>p.name.toLowerCase().includes(q)||p.description?.toLowerCase().includes(q));
  renderProducts(filtered);
}

function renderProducts(list){
  const grid = document.getElementById('productGrid');
  if(!list.length){
    grid.innerHTML='<div class="empty" style="grid-column:1/-1"><div class="empty-icon">🔍</div><div>Mahsulot topilmadi</div></div>';
    return;
  }
  grid.innerHTML = list.map(p=>{
    const colors = p.colors ? p.colors.split(',').filter(Boolean).slice(0,3) : [];
    const imgHTML = p.photo ? `<img src="${p.photo}" alt="${p.name}">` : `<span>📦</span>`;
    return `<div class="prod-card" onclick="openModal(${p.id})">
      <div class="prod-img">${imgHTML}</div>
      <div class="prod-info">
        <div class="prod-name">${p.name}</div>
        <div class="prod-desc">${p.description||''}</div>
        <div class="tags">${colors.map(c=>`<span class="tag">${c.trim()}</span>`).join('')}</div>
      </div>
    </div>`;
  }).join('');
}

function openModal(id){
  const p = products.find(x=>x.id===id);
  document.getElementById('mImg').innerHTML = p.photo ? `<img src="${p.photo}" alt="${p.name}">` : `<span style="font-size:80px">📦</span>`;
  document.getElementById('mName').textContent = p.name;
  document.getElementById('mDesc').textContent = p.description || '';
  
  const colors = p.colors ? p.colors.split(',').filter(Boolean) : [];
  document.getElementById('mColors').innerHTML = colors.length
    ? colors.map((c,i)=>`<div class="color-item${i===0?' selected':''}" onclick="selectColor(this)"><div class="color-dot" style="background:#ccc"></div>${c.trim()}</div>`).join('')
    : '<span style="font-size:13px;color:#888">Ko\'rsatilmagan</span>';

  const sizes = p.sizes ? p.sizes.split(',').filter(Boolean) : [];
  document.getElementById('mSizes').innerHTML = sizes.length
    ? sizes.map(s=>{const parts=s.split(':');return`<div class="size-box"><div class="size-label">${parts[0]?.trim()||''}</div><div>${parts[1]?.trim()||s.trim()}</div></div>`;}).join('')
    : '<div class="size-box" style="grid-column:1/-1">Ko\'rsatilmagan</div>';

  document.getElementById('mTags').innerHTML = '';
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow='hidden';
}

function selectColor(el){
  document.querySelectorAll('.color-item').forEach(c=>c.classList.remove('selected'));
  el.classList.add('selected');
}

function closeModal(){
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow='';
}

function handleModalClick(e){
  if(e.target.id==='modal') closeModal();
}

function contactAdmin(){
  closeModal();
  if(window.Telegram?.WebApp){
    window.Telegram.WebApp.openTelegramLink('https://t.me/ElyorMurotaliyev');
  } else {
    window.open('https://t.me/ElyorMurotaliyev', '_blank');
  }
}

if(window.Telegram?.WebApp){
  window.Telegram.WebApp.ready();
  window.Telegram.WebApp.expand();
}

init();
</script>
</body>
</html>
